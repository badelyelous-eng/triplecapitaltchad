<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 260" fill="none" role="img" aria-label="Triple Capital Tchad">
  <title>Triple Capital Tchad</title>
  <!--
    Barres :
    - Largeur : 30 px
    - Espacement inter-barres : 15 px (moitié de la largeur)
    - Position x : 25, 70, 115
  -->
  <rect x="25" y="20" width="30" height="200" fill="#1B6B3A"/>
  <rect x="70" y="75" width="30" height="145" fill="#8CC152"/>
  <rect x="115" y="115" width="30" height="105" fill="#D4E157"/>
  <!-- Ligne horizontale sous les barres -->
  <rect x="0" y="222" width="170" height="4" fill="#1B6B3A"/>
</svg>
